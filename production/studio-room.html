            border: 1px solid #ddd;

        }
        .product-item .name {
            font-size: 17px;
            font-weight: bold;

            color: #222;
        }
        .product-item .price {
            color: #e53935;
            font-size: 16px;
            margin: 4px 0 10px 0;
        }
        .product-item .link {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background: #1976d2;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.18s;
        }
        .product-item .link:hover { background: #024284; }
        @media (max-width: 700px) {
            .product-listing { flex-direction: column; align-items: center; }
            .product-item { width: 90%; }
        }
        .delivery-label {
            margin: 8px 0;
            font-size: 13px;
            color: #1976d2;
            font-weight: 500;
        }
        .site-footer {
            background: #f5f5f5;
            color: #444;
            text-align: center;
            padding: 25px 10px 10px 10px;
            margin-top: 40px;
            font-size: 15px;
            border-top: 1px solid #e0e0e0;
        }
        .site-footer .footer-links {
            margin-bottom: 8px;
        }
        .site-footer a {
            color: #1976d2;
            text-decoration: none;
            margin: 0 8px;
        }
        .site-footer a:hover {
            text-decoration: underline;
        }
        .site-footer span {
            color: #aaa;
            margin: 0 4px;
        }
        /* PWA install banner style */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1976d2;
            color: #fff;
            padding: 16px;
            text-align: center;
            z-index: 2000;
        }
        #installBanner button {
            background: #fff;
            color: #1976d2;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            margin-left: 12px;
            cursor: pointer;
            font-size: 15px;
        }
    </style>

                function formatDate(date) {

                }
                const deliveryDiv = document.createElement('div');
                deliveryDiv.className = 'delivery-label';
                deliveryDiv.textContent = `Delivery: ${formatDate(minDeliveryDate)} - ${formatDate(maxDeliveryDate)}`;

                const link = document.createElement('a');
                link.href = product.offers && product.offers.url ? product.offers.url : "#";
                link.textContent = "View Product";
                link.target = "_blank";
                link.className = "link";

                let parsedPrice = 25; // default fallback
                try {
                    let priceStr = product.offers.price ? product.offers.price.toString().replace(/[$₦]/g, '').trim() : '';

                        throw new Error('Price is not a valid number');
